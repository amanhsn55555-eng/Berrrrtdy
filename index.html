<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>بئر النفط • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }

  .add-well-btn { display: none !important; }
.oil-header { justify-content: center !important; }
.oil-header h2 { margin: 0 auto !important; }
    body {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #f8fafc;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========== هيدر ========== */
    .oil-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 16px;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border-bottom: 2px solid #2dd4bf;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .oil-header h2 {
      font-size: 20px;
      font-weight: 800;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .oil-header h2 i {
      color: #2dd4bf;
      font-size: 22px;
    }

    .back-btn, .add-well-btn {
      cursor: pointer;
      color: #94a3b8;
      font-size: 20px;
      transition: all 0.2s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .back-btn:hover, .add-well-btn:hover {
      color: #2dd4bf;
      background: rgba(45, 212, 191, 0.1);
    }

    /* ========== عرض الموارد ========== */
    .resources-bar {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      z-index: 998;
      border-bottom: 1px solid rgba(45, 212, 191, 0.2);
      display: flex;
      justify-content: space-around;
    }

    .resource-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 16px;
      border-radius: 40px;
      border: 1px solid rgba(45, 212, 191, 0.2);
    }

    .resource-badge i {
      font-size: 16px;
    }

    .resource-badge.gold i { color: #fbbf24; }
    .resource-badge.oil i { color: #2dd4bf; }

    .resource-badge span {
      font-weight: 800;
      font-size: 16px;
    }

    /* ========== المحتوى الرئيسي ========== */
    .oil-container {
      margin-top: 125px;
      padding: 15px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* بطاقة البئر الأساسي */
    .main-well-card {
      background: linear-gradient(145deg, #0f3460, #1a1a2e);
      border-radius: 35px;
      padding: 30px 20px;
      margin-bottom: 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(45, 212, 191, 0.3);
      border: 1px solid rgba(45, 212, 191, 0.2);
      position: relative;
      overflow: hidden;
    }

    .main-well-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.05) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    .well-icon {
      position: relative;
      z-index: 1;
    }

    .well-icon i {
      font-size: 70px;
      color: #2dd4bf;
      filter: drop-shadow(0 0 30px rgba(45, 212, 191, 0.5));
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .well-level {
      position: relative;
      z-index: 1;
      margin: 20px 0;
    }

    .level-badge {
      display: inline-block;
      background: linear-gradient(135deg, #2dd4bf, #0d9488);
      padding: 8px 25px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 18px;
      color: #0f172a;
      box-shadow: 0 8px 20px rgba(45, 212, 191, 0.3);
    }

    .production-info {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 25px;
      padding: 20px;
      margin: 20px 0;
    }

    .production-rate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 28px;
      font-weight: 800;
      color: #2dd4bf;
    }

    .production-rate i {
      font-size: 24px;
    }

    .production-label {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 5px;
    }

    .next-collection {
      background: rgba(45, 212, 191, 0.1);
      border-radius: 20px;
      padding: 15px;
      margin: 15px 0;
      border: 1px dashed #2dd4bf;
    }

    .timer {
      font-size: 32px;
      font-weight: 800;
      color: #fbbf24;
      font-family: monospace;
    }

    .timer-label {
      color: #94a3b8;
      font-size: 12px;
    }

    .collect-btn {
      background: linear-gradient(135deg, #2dd4bf, #0d9488);
      border: none;
      color: #0f172a;
      padding: 18px 30px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 10px 30px rgba(45, 212, 191, 0.4);
      transition: all 0.3s;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .collect-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(45, 212, 191, 0.5);
    }

    .collect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* بطاقات الترقية للبئر الأساسي */
    .upgrades-section {
      margin-top: 25px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: #f8fafc;
      font-size: 18px;
      font-weight: 700;
    }

    .section-title i {
      color: #fbbf24;
    }

    .upgrade-card {
      background: linear-gradient(145deg, #1e3a5f, #0f3460);
      border-radius: 25px;
      padding: 18px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid rgba(45, 212, 191, 0.2);
      transition: all 0.2s;
      position: relative;
    }

    .upgrade-card.purchased {
      opacity: 0.7;
      border-color: #10b981;
    }

    .upgrade-card.purchased::after {
      content: '✓';
      position: absolute;
      top: 10px;
      left: 15px;
      width: 25px;
      height: 25px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
    }

    .upgrade-icon {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      background: linear-gradient(145deg, #2dd4bf, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #0f172a;
      flex-shrink: 0;
    }

    .upgrade-info {
      flex: 1;
    }

    .upgrade-name {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 5px;
      color: #f8fafc;
    }

    .upgrade-desc {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .upgrade-benefit {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2dd4bf;
      font-weight: 700;
      font-size: 14px;
    }

    .upgrade-benefit i {
      font-size: 12px;
    }

    .upgrade-price {
      text-align: center;
      flex-shrink: 0;
    }

    .price-value {
      font-weight: 800;
      font-size: 18px;
      color: #fbbf24;
    }

    .price-label {
      font-size: 10px;
      color: #94a3b8;
    }

    .buy-btn {
      background: linear-gradient(135deg, #fbbf24, #d97706);
      border: none;
      color: #0f172a;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
      transition: all 0.2s;
    }

    .buy-btn:hover {
      transform: scale(1.02);
    }

    .buy-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .purchased-badge {
      color: #10b981;
      font-weight: 700;
      font-size: 12px;
      margin-top: 8px;
    }

    /* ملخص الآبار الإضافية */
    .extra-wells-summary {
      background: linear-gradient(145deg, #1e3a5f, #0f3460);
      border-radius: 25px;
      padding: 20px;
      margin: 25px 0;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }

    .summary-stats {
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-item {
      flex: 1;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: #f8fafc;
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 5px;
    }

    /* بطاقة بئر إضافي مملوك */
    .extra-well-card {
      background: linear-gradient(145deg, #1e3a5f, #0f3460);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid rgba(45, 212, 191, 0.2);
      position: relative;
    }

    .extra-well-icon {
      width: 55px;
      height: 55px;
      border-radius: 18px;
      background: linear-gradient(145deg, #2dd4bf, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #0f172a;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
    }

    .extra-well-info {
      flex: 1;
    }

    .extra-well-name {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 5px;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .extra-well-desc {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .extra-well-stats {
      display: flex;
      gap: 15px;
    }

    .extra-well-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .extra-well-stat i {
      color: #2dd4bf;
    }

    .well-expiry {
      font-size: 10px;
      color: #fbbf24;
      margin-top: 5px;
    }

    .collect-extra-btn {
      background: linear-gradient(135deg, #2dd4bf, #0d9488);
      border: none;
      color: #0f172a;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      margin-top: 8px;
    }

    /* أزرار المالك (تعديل/حذف) */
    .owner-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
      z-index: 10;
    }

    .owner-btn {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .owner-btn.edit-btn:hover {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }

    .owner-btn.delete-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    /* قسم الآبار المتاحة للتطوير */
    .available-well-card {
      background: linear-gradient(145deg, #1e3a5f, #0f3460);
      border-radius: 25px;
      padding: 18px;
      margin-bottom: 15px;
      border: 1px solid rgba(45, 212, 191, 0.2);
      position: relative;
    }

    .well-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .well-image {
      width: 65px;
      height: 65px;
      border-radius: 20px;
      background: linear-gradient(145deg, #2dd4bf, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #0f172a;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
    }

    .well-title {
      flex: 1;
    }

    .well-title h3 {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .well-title p {
      font-size: 11px;
      color: #94a3b8;
    }

    .well-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 15px 0;
    }

    .detail-item {
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 15px;
      text-align: center;
    }

    .detail-value {
      font-weight: 800;
      font-size: 15px;
      color: #2dd4bf;
    }

    .detail-label {
      font-size: 9px;
      color: #94a3b8;
    }

    .well-price-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .price-tag {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .buy-well-btn {
      background: linear-gradient(135deg, #fbbf24, #d97706);
      border: none;
      color: #0f172a;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .buy-well-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3);
    }

    .buy-well-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .owned-badge {
      background: #10b981;
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* مودال */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border-radius: 30px;
      padding: 25px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h3 {
      font-size: 20px;
      font-weight: 800;
      color: #2dd4bf;
    }

    .close-modal {
      cursor: pointer;
      font-size: 24px;
      color: #94a3b8;
      transition: all 0.2s;
    }

    .close-modal:hover {
      color: #ef4444;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 15px;
      color: white;
      font-size: 14px;
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #2dd4bf;
    }

    .submit-well-btn {
      background: linear-gradient(135deg, #2dd4bf, #0d9488);
      border: none;
      color: #0f172a;
      padding: 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .delete-confirm-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      color: white;
      padding: 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    /* سجل الإنتاج */
    .history-section {
      margin-top: 30px;
      padding-bottom: 30px;
    }

    .history-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-icon {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      background: rgba(45, 212, 191, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2dd4bf;
    }

    .history-details .history-title {
      font-weight: 600;
      margin-bottom: 3px;
    }

    .history-details .history-time {
      font-size: 11px;
      color: #64748b;
    }

    .history-amount {
      font-weight: 800;
      color: #2dd4bf;
      font-size: 18px;
    }

    /* حالة فارغة */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .empty-state i {
      font-size: 50px;
      opacity: 0.3;
      margin-bottom: 15px;
    }

    /* إشعار */
    #toastMsg {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      z-index: 5000;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
      font-weight: 600;
    }

    #toastMsg.show {
      opacity: 1;
      bottom: 40px;
    }

    /* تحميل */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
    }

    .loading-spinner i {
      font-size: 35px;
      color: #2dd4bf;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* تأثير الجزيئات */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #2dd4bf;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 8s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* شارة الناشر */
    .publisher-badge {
      background: #8b5cf6;
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 700;
      margin-right: 5px;
    }
  </style>
</head>
<body>

<!-- هيدر -->
<div class="oil-header">
  <div class="back-btn" onclick="goBack()">
    <i class="fas fa-arrow-right"></i>
  </div>
  <h2><i class="fas fa-oil-well"></i> بئر النفط</h2>
  <div class="add-well-btn" onclick="openAddWellModal()">
    <i class="fas fa-plus"></i>
  </div>
</div>

<!-- شريط الموارد -->
<div class="resources-bar">
  <div class="resource-badge gold">
    <i class="fas fa-coins"></i>
    <span id="goldDisplay">0</span>
  </div>
  <div class="resource-badge oil">
    <i class="fas fa-oil-can"></i>
    <span id="oilDisplay">0</span>
  </div>
</div>

<!-- المحتوى الرئيسي -->
<div class="oil-container" id="oilContainer">
  <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
</div>

<!-- مودال إضافة/تعديل بئر -->
<div class="modal-overlay" id="wellModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> إضافة بئر جديد</h3>
      <div class="close-modal" onclick="closeWellModal()">
        <i class="fas fa-times"></i>
      </div>
    </div>
    <form onsubmit="saveWell(event)">
      <input type="hidden" id="editingWellId" value="">
      <div class="form-group">
        <label>اسم البئر</label>
        <input type="text" id="wellName" placeholder="مثال: بئر الخليج" required>
      </div>
      <div class="form-group">
        <label>عملات النفط اليومية</label>
        <input type="number" id="dailyOil" placeholder="مثال: 100" required>
      </div>
      <div class="form-group">
        <label>سعر التطوير بالذهب</label>
        <input type="number" id="goldPrice" placeholder="مثال: 5000" required>
      </div>
      <div class="form-group">
        <label>المدة بالأشهر</label>
        <input type="number" id="durationMonths" placeholder="مثال: 3" required>
      </div>
      <div class="form-group">
        <label>رابط صورة البئر</label>
        <input type="text" id="wellImage" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>وصف البئر</label>
        <textarea id="wellDescription" rows="2" placeholder="وصف مختصر للبئر"></textarea>
      </div>
      <button type="submit" class="submit-well-btn" id="saveWellBtn">
        <i class="fas fa-save"></i> حفظ البئر
      </button>
      <button type="button" class="delete-confirm-btn" id="deleteWellBtn" style="display:none;" onclick="deleteWellConfirm()">
        <i class="fas fa-trash"></i> حذف البئر
      </button>
    </form>
  </div>
</div>

<div id="toastMsg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYKCCTcurNcJslrNKqdiJCoIIK-YZArB4",
    authDomain: "sbaq-fc46f.firebaseapp.com",
    projectId: "sbaq-fc46f",
    storageBucket: "sbaq-fc46f.firebasestorage.app",
    appId: "1:1026865750415:web:0ee39a717bcafaa0d06bfa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // مستويات البئر الأساسي
  const WELL_LEVELS = {
    0: { name: 'بئر صغير', production: 2, upgradeCost: 0 },
    1: { name: 'بئر متوسط', production: 500, upgradeCost: 10000 },
    2: { name: 'بئر كبير', production: 1000, upgradeCost: 15000 },
    3: { name: 'بئر عملاق', production: 5000, upgradeCost: 50000 }
  };

  let currentUser = null;
  let resources = { gold: 10000, oil: 0 };
  let mainWellData = {
    level: 0,
    lastCollection: 0,
    collectionHistory: []
  };
  let extraWells = [];
  let availableWells = [];
  let timerInterval = null;

  function showToast(msg, isSuccess = true) {
    const t = document.getElementById('toastMsg');
    if (!t) return;
    t.textContent = msg;
    t.style.background = isSuccess ? '#10b981' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  window.goBack = function() {
    window.history.back();
  };

  function formatNumber(num) {
    return num?.toLocaleString('ar-SA') || '0';
  }

  function formatTime(seconds) {
    if (seconds <= 0) return '00:00:00';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }

  function getTimeUntilNextCollection() {
    const now = Date.now();
    const lastCollection = mainWellData.lastCollection || now;
    const elapsed = Math.floor((now - lastCollection) / 1000);
    const cooldown = 24 * 60 * 60;
    const remaining = Math.max(0, cooldown - elapsed);
    return { remaining, canCollect: remaining === 0 };
  }

  function getMainWellProduction() {
    return WELL_LEVELS[mainWellData.level]?.production || 10;
  }

  function calculateTotalProfit(well) {
    const daysInMonth = 30;
    const totalDays = well.durationMonths * daysInMonth;
    const totalOil = well.dailyOil * totalDays;
    return { totalOil, totalDays };
  }

  function calculateExtraWellsStats() {
    let totalDaily = 0;
    let totalInvested = 0;
    let totalExpected = 0;
    
    extraWells.forEach(well => {
      totalDaily += well.dailyOil;
      totalInvested += well.goldPrice;
      const { totalOil } = calculateTotalProfit(well);
      totalExpected += totalOil;
    });
    
    return { totalDaily, totalInvested, totalExpected };
  }

  async function loadAvailableWells() {
    try {
      const wellsDoc = await getDoc(doc(db, "system"));
      if (wellsDoc.exists()) {
        availableWells = wellsDoc.data().wells || [];
      } else {
        availableWells = [
          {
            id: 'well1',
            name: 'بئر الخليج',
            dailyOil: 100,
            goldPrice: 5000000,
            durationMonths: 3,
            image: '',
            description: 'بئر نفطي في منطقة الخليج العربي',
            ownerId: 'system'
          },
          {
            id: 'well2',
            name: 'بئر الصحراء',
            dailyOil: 250,
            goldPrice: 1200000,
            durationMonths: 6,
            image: '',
            description: 'بئر عميق في الصحراء',
            ownerId: 'system'
          }
        ];
      }
    } catch (error) {
      console.error("خطأ في تحميل الآبار:", error);
    }
  }

  async function loadUserData(uid) {
    try {
      const resourcesDoc = await getDoc(doc(db, "resources", uid));
      if (resourcesDoc.exists()) {
        resources = resourcesDoc.data();
        if (resources.gold === undefined) resources.gold = 10000;
      } else {
        resources = { gold: 10000, oil: 0 };
        await setDoc(doc(db, "resources", uid), resources);
      }
      
      const mainWellDoc = await getDoc(doc(db, "oil_wells", uid));
      if (mainWellDoc.exists()) {
        mainWellData = mainWellDoc.data();
      } else {
        mainWellData = {
          level: 0,
          lastCollection: Date.now(),
          collectionHistory: []
        };
        await setDoc(doc(db, "oil_wells", uid), mainWellData);
      }
      
      const extraWellsDoc = await getDoc(doc(db, "extra_wells", uid));
      if (extraWellsDoc.exists()) {
        extraWells = extraWellsDoc.data().wells || [];
      } else {
        extraWells = [];
        await setDoc(doc(db, "extra_wells", uid), { wells: [] });
      }
      
      await loadAvailableWells();
      updateResourcesDisplay();
      renderPage();
      startTimer();
      
    } catch (error) {
      console.error("خطأ في تحميل البيانات:", error);
    }
  }

  function updateResourcesDisplay() {
    document.getElementById('goldDisplay').textContent = formatNumber(resources.gold || 0);
    document.getElementById('oilDisplay').textContent = formatNumber(resources.oil || 0);
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
      const { remaining, canCollect } = getTimeUntilNextCollection();
      const timerElement = document.getElementById('collectionTimer');
      if (timerElement) {
        timerElement.textContent = formatTime(remaining);
      }
      
      const collectBtn = document.getElementById('collectMainBtn');
      if (collectBtn) {
        collectBtn.disabled = !canCollect;
      }
    }, 1000);
  }

  // ========== وظائف البئر الأساسي ==========
  window.collectMainWell = async function() {
    const { canCollect } = getTimeUntilNextCollection();
    if (!canCollect) {
      showToast('لم يحن وقت التجميع بعد', false);
      return;
    }
    
    const production = getMainWellProduction();
    
    try {
      const newOil = (resources.oil || 0) + production;
      
      await updateDoc(doc(db, "resources", currentUser.uid), {
        oil: newOil
      });
      
      const historyEntry = {
        amount: production,
        level: mainWellData.level,
        timestamp: Date.now()
      };
      
      await updateDoc(doc(db, "oil_wells", currentUser.uid), {
        lastCollection: Date.now(),
        collectionHistory: arrayUnion(historyEntry)
      });
      
      resources.oil = newOil;
      mainWellData.lastCollection = Date.now();
      mainWellData.collectionHistory = [...(mainWellData.collectionHistory || []), historyEntry];
      
      updateResourcesDisplay();
      renderPage();
      startTimer();
      
      showToast(`تم تجميع ${production} نفط من البئر الأساسي!`, true);
      
    } catch (error) {
      console.error("خطأ في التجميع:", error);
      showToast('فشل التجميع', false);
    }
  };

  window.purchaseMainUpgrade = async function(targetLevel) {
    const currentLevel = mainWellData.level || 0;
    
    if (targetLevel <= currentLevel) {
      showToast('لقد قمت بشراء هذه الترقية مسبقاً', false);
      return;
    }
    
    if (targetLevel !== currentLevel + 1) {
      showToast('يجب شراء الترقيات بالترتيب', false);
      return;
    }
    
    const levelInfo = WELL_LEVELS[targetLevel];
    if (!levelInfo) return;
    
    if (resources.gold < levelInfo.upgradeCost) {
      showToast('رصيد الذهب غير كافٍ', false);
      return;
    }
    
    try {
      const newGold = resources.gold - levelInfo.upgradeCost;
      
      await updateDoc(doc(db, "resources", currentUser.uid), {
        gold: newGold
      });
      
      await updateDoc(doc(db, "oil_wells", currentUser.uid), {
        level: targetLevel
      });
      
      resources.gold = newGold;
      mainWellData.level = targetLevel;
      
      updateResourcesDisplay();
      renderPage();
      startTimer();
      
      showToast(`تمت الترقية إلى ${levelInfo.name}!`, true);
      
    } catch (error) {
      console.error("خطأ في الترقية:", error);
      showToast('فشلت الترقية', false);
    }
  };

  // ========== وظائف إدارة الآبار (للجميع مع التحقق من الملكية) ==========
  window.openAddWellModal = function() {
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة بئر جديد';
    document.getElementById('editingWellId').value = '';
    document.getElementById('wellName').value = '';
    document.getElementById('dailyOil').value = '';
    document.getElementById('goldPrice').value = '';
    document.getElementById('durationMonths').value = '';
    document.getElementById('wellImage').value = '';
    document.getElementById('wellDescription').value = '';
    document.getElementById('deleteWellBtn').style.display = 'none';
    document.getElementById('saveWellBtn').style.display = 'block';
    document.getElementById('wellModal').style.display = 'flex';
  };

  window.editWell = function(wellId) {
    const well = availableWells.find(w => w.id === wellId);
    if (!well) return;
    
    // التحقق من أن المستخدم الحالي هو مالك البئر
    if (well.ownerId !== currentUser.uid) {
      showToast('لا يمكنك تعديل بئر لا تملكه', false);
      return;
    }
    
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل البئر';
    document.getElementById('editingWellId').value = wellId;
    document.getElementById('wellName').value = well.name || '';
    document.getElementById('dailyOil').value = well.dailyOil || '';
    document.getElementById('goldPrice').value = well.goldPrice || '';
    document.getElementById('durationMonths').value = well.durationMonths || '';
    document.getElementById('wellImage').value = well.image || '';
    document.getElementById('wellDescription').value = well.description || '';
    document.getElementById('deleteWellBtn').style.display = 'block';
    document.getElementById('saveWellBtn').style.display = 'block';
    document.getElementById('wellModal').style.display = 'flex';
  };

  window.closeWellModal = function() {
    document.getElementById('wellModal').style.display = 'none';
  };

  window.saveWell = async function(e) {
    e.preventDefault();
    
    const editingId = document.getElementById('editingWellId').value;
    
    // إذا كان تعديلاً، تحقق من الملكية
    if (editingId) {
      const existingWell = availableWells.find(w => w.id === editingId);
      if (existingWell && existingWell.ownerId !== currentUser.uid) {
        showToast('لا يمكنك تعديل بئر لا تملكه', false);
        return;
      }
    }
    
    const wellData = {
      id: editingId || 'well_' + Date.now(),
      name: document.getElementById('wellName').value,
      dailyOil: parseInt(document.getElementById('dailyOil').value),
      goldPrice: parseInt(document.getElementById('goldPrice').value),
      durationMonths: parseInt(document.getElementById('durationMonths').value),
      image: document.getElementById('wellImage').value,
      description: document.getElementById('wellDescription').value,
      ownerId: currentUser.uid, // حفظ معرف المالك
      createdAt: editingId ? (availableWells.find(w => w.id === editingId)?.createdAt || Date.now()) : Date.now(),
      updatedAt: Date.now()
    };
    
    try {
      if (editingId) {
        const index = availableWells.findIndex(w => w.id === editingId);
        if (index !== -1) {
          availableWells[index] = wellData;
        }
      } else {
        availableWells.push(wellData);
      }
      
      await setDoc(doc(db, "system", "available_wells"), { wells: availableWells });
      
      closeWellModal();
      renderPage();
      showToast(editingId ? 'تم تحديث البئر بنجاح!' : 'تم إضافة البئر بنجاح!');
    } catch (error) {
      console.error("خطأ في الحفظ:", error);
      showToast('فشل حفظ البئر', false);
    }
  };

  window.deleteWellConfirm = async function() {
    const wellId = document.getElementById('editingWellId').value;
    if (!wellId) return;
    
    const well = availableWells.find(w => w.id === wellId);
    
    // التحقق من أن المستخدم الحالي هو مالك البئر
    if (!well || well.ownerId !== currentUser.uid) {
      showToast('لا يمكنك حذف بئر لا تملكه', false);
      return;
    }
    
    if (!confirm('هل أنت متأكد من حذف هذا البئر؟')) return;
    
    try {
      availableWells = availableWells.filter(w => w.id !== wellId);
      await setDoc(doc(db, "system", "available_wells"), { wells: availableWells });
      
      closeWellModal();
      renderPage();
      showToast('تم حذف البئر بنجاح!');
    } catch (error) {
      console.error("خطأ في الحذف:", error);
      showToast('فشل حذف البئر', false);
    }
  };

  // ========== وظائف الآبار الإضافية ==========
  window.buyExtraWell = async function(wellId) {
    const well = availableWells.find(w => w.id === wellId);
    if (!well) return;
    
    const alreadyOwned = extraWells.some(w => w.id === wellId);
    if (alreadyOwned) {
      showToast('أنت تملك هذا البئر بالفعل', false);
      return;
    }
    
    if (resources.gold < well.goldPrice) {
      showToast('الذهب غير كافٍ لشراء هذا البئر', false);
      return;
    }
    
    try {
      const newGold = resources.gold - well.goldPrice;
      await updateDoc(doc(db, "resources", currentUser.uid), {
        gold: newGold
      });
      
      const wellWithPurchaseData = {
        ...well,
        purchasedAt: Date.now(),
        expiresAt: Date.now() + (well.durationMonths * 30 * 24 * 60 * 60 * 1000),
        lastCollection: Date.now()
      };
      
      extraWells.push(wellWithPurchaseData);
      await updateDoc(doc(db, "extra_wells", currentUser.uid), {
        wells: extraWells
      });
      
      resources.gold = newGold;
      
      updateResourcesDisplay();
      renderPage();
      
      const { totalOil } = calculateTotalProfit(well);
      showToast(`تم شراء ${well.name} بنجاح! سينتج ${formatNumber(totalOil)} نفط خلال ${well.durationMonths} شهر`, true);
      
    } catch (error) {
      console.error("خطأ في الشراء:", error);
      showToast('فشلت عملية الشراء', false);
    }
  };

  window.collectExtraWell = async function(wellId) {
    const wellIndex = extraWells.findIndex(w => w.id === wellId);
    if (wellIndex === -1) return;
    
    const well = extraWells[wellIndex];
    const now = Date.now();
    const lastCollection = well.lastCollection || well.purchasedAt;
    const daysPassed = Math.floor((now - lastCollection) / (24 * 60 * 60 * 1000));
    
    if (daysPassed < 1) {
      showToast('لم يحن وقت التجميع بعد (يجب مرور يوم كامل)', false);
      return;
    }
    
    const maxDays = 30;
    const collectAmount = Math.min(daysPassed, maxDays) * well.dailyOil;
    
    try {
      const newOil = (resources.oil || 0) + collectAmount;
      await updateDoc(doc(db, "resources", currentUser.uid), {
        oil: newOil
      });
      
      extraWells[wellIndex].lastCollection = now;
      
      await updateDoc(doc(db, "extra_wells", currentUser.uid), {
        wells: extraWells
      });
      
      resources.oil = newOil;
      updateResourcesDisplay();
      renderPage();
      
      showToast(`تم تجميع ${formatNumber(collectAmount)} نفط من ${well.name}!`, true);
      
    } catch (error) {
      console.error("خطأ في التجميع:", error);
      showToast('فشل التجميع', false);
    }
  };

  // ========== عرض الصفحة ==========
  function renderPage() {
    const container = document.getElementById('oilContainer');
    if (!container) return;
    
    const mainLevel = mainWellData.level || 0;
    const levelInfo = WELL_LEVELS[mainLevel];
    const mainProduction = getMainWellProduction();
    const { remaining, canCollect } = getTimeUntilNextCollection();
    const history = mainWellData.collectionHistory || [];
    const extraStats = calculateExtraWellsStats();
    
    const ownedIds = extraWells.map(w => w.id);
    const availableToShow = availableWells.filter(w => !ownedIds.includes(w.id));
    
    const particles = Array.from({ length: 15 }, (_, i) => `
      <div class="particle" style="left: ${Math.random() * 100}%; top: ${Math.random() * 100}%; animation-delay: ${Math.random() * 8}s; animation-duration: ${6 + Math.random() * 6}s;"></div>
    `).join('');
    
    const totalDailyProduction = mainProduction + extraStats.totalDaily;
    
    container.innerHTML = `
      <!-- البئر الأساسي -->
      <div class="main-well-card">
        <div class="particles">${particles}</div>
        
        <div class="well-icon">
          <i class="fas fa-oil-well"></i>
        </div>
        
        <div class="well-level">
          <span class="level-badge">
            <i class="fas fa-tachometer-alt"></i> ${levelInfo.name}
          </span>
        </div>
        
        <div class="production-info">
          <div class="production-rate">
            <i class="fas fa-oil-can"></i>
            <span>${mainProduction}</span>
          </div>
          <div class="production-label">إنتاج يومي (البئر الأساسي)</div>
        </div>
        
        ${extraWells.length > 0 ? `
          <div style="margin:10px 0; padding:10px; background:rgba(45,212,191,0.1); border-radius:15px;">
            <div style="font-size:13px; color:#94a3b8;">+ ${formatNumber(extraStats.totalDaily)} نفط/يوم من الآبار الإضافية</div>
            <div style="font-size:18px; font-weight:800; color:#2dd4bf;">الإجمالي: ${formatNumber(totalDailyProduction)} نفط/يوم</div>
          </div>
        ` : ''}
        
        <div class="next-collection">
          <div class="timer" id="collectionTimer">${formatTime(remaining)}</div>
          <div class="timer-label">متبقي حتى التجميع القادم</div>
        </div>
        
        <button class="collect-btn" id="collectMainBtn" onclick="collectMainWell()" ${!canCollect ? 'disabled' : ''}>
          <i class="fas fa-hand-holding"></i>
          ${canCollect ? `تجميع ${mainProduction} نفط` : 'غير متاح للتجميع'}
        </button>
      </div>
      
      <!-- ترقيات البئر الأساسي -->
      <div class="upgrades-section">
        <div class="section-title">
          <i class="fas fa-arrow-up"></i>
          <span>ترقية البئر الأساسي</span>
        </div>
        
        ${renderMainUpgradeCards(mainLevel)}
      </div>
      
      <!-- ملخص الآبار الإضافية -->
      ${extraWells.length > 0 ? `
        <div class="extra-wells-summary">
          <div class="section-title" style="margin-bottom:15px;">
            <i class="fas fa-oil-can"></i>
            <span>الآبار المطورة</span>
          </div>
          <div class="summary-stats">
            <div class="stat-item">
              <div class="stat-value">${formatNumber(extraWells.length)}</div>
              <div class="stat-label">بئر إضافي</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${formatNumber(extraStats.totalDaily)}</div>
              <div class="stat-label">إنتاج يومي</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${formatNumber(extraStats.totalExpected)}</div>
              <div class="stat-label">إجمالي متوقع</div>
            </div>
          </div>
        </div>
        
        ${extraWells.map(well => renderExtraWellCard(well)).join('')}
      ` : ''}
      
      <!-- الآبار المتاحة للتطوير -->
      ${availableToShow.length > 0 ? `
        <div class="upgrades-section">
          <div class="section-title">
            <i class="fas fa-store"></i>
            <span>آبار متاحة للتطوير</span>
          </div>
          ${availableToShow.map(well => renderAvailableWellCard(well)).join('')}
        </div>
      ` : ''}
      
      <!-- سجل التجميع -->
      <div class="history-section">
        <div class="section-title">
          <i class="fas fa-history"></i>
          <span>سجل التجميع</span>
        </div>
        
        ${history.length > 0 ? history.slice(-10).reverse().map(item => `
          <div class="history-card">
            <div class="history-info">
              <div class="history-icon">
                <i class="fas fa-oil-can"></i>
              </div>
              <div class="history-details">
                <div class="history-title">${WELL_LEVELS[item.level]?.name || 'بئر'}</div>
                <div class="history-time">${new Date(item.timestamp).toLocaleString('ar-SA')}</div>
              </div>
            </div>
            <div class="history-amount">+${formatNumber(item.amount)} 🛢️</div>
          </div>
        `).join('') : `
          <div class="empty-state">
            <i class="fas fa-oil-can"></i>
            <p>لا يوجد سجل تجميع بعد</p>
          </div>
        `}
      </div>
    `;
  }

  function renderMainUpgradeCards(currentLevel) {
    const cards = [];
    
    for (let level = 1; level <= 3; level++) {
      const levelInfo = WELL_LEVELS[level];
      const isPurchased = currentLevel >= level;
      const canAfford = resources.gold >= levelInfo.upgradeCost;
      
      if (isPurchased && level !== currentLevel) continue;
      
      cards.push(`
        <div class="upgrade-card ${isPurchased ? 'purchased' : ''}">
          <div class="upgrade-icon">
            <i class="fas fa-${level === 1 ? 'arrow-up' : level === 2 ? 'arrow-trend-up' : 'crown'}"></i>
          </div>
          <div class="upgrade-info">
            <div class="upgrade-name">${levelInfo.name}</div>
            <div class="upgrade-desc">ترقية من ${WELL_LEVELS[level-1]?.name}</div>
            <div class="upgrade-benefit">
              <i class="fas fa-oil-can"></i>
              <span>إنتاج ${levelInfo.production} نفط/يوم</span>
            </div>
          </div>
          <div class="upgrade-price">
            ${!isPurchased ? `
              <div class="price-value">${formatNumber(levelInfo.upgradeCost)}</div>
              <div class="price-label">ذهب</div>
              <button class="buy-btn" onclick="purchaseMainUpgrade(${level})" ${!canAfford ? 'disabled' : ''}>
                ${canAfford ? 'شراء' : 'ذهب غير كافٍ'}
              </button>
            ` : `
              <div class="purchased-badge">
                <i class="fas fa-check-circle"></i> تم الشراء
              </div>
            `}
          </div>
        </div>
      `);
    }
    
    return cards.join('');
  }

  function renderExtraWellCard(well) {
    const { totalOil } = calculateTotalProfit(well);
    const now = Date.now();
    const remainingTime = well.expiresAt ? Math.max(0, well.expiresAt - now) : 0;
    const remainingDays = Math.ceil(remainingTime / (24 * 60 * 60 * 1000));
    const lastCollection = well.lastCollection || well.purchasedAt;
    const daysSinceLastCollection = Math.floor((now - lastCollection) / (24 * 60 * 60 * 1000));
    const canCollect = daysSinceLastCollection >= 1;
    const collectAmount = Math.min(daysSinceLastCollection, 30) * well.dailyOil;
    
    return `
      <div class="extra-well-card">
        <div class="extra-well-icon" style="background-image: url('${well.image}');">
          ${!well.image ? '<i class="fas fa-oil-well"></i>' : ''}
        </div>
        <div class="extra-well-info">
          <div class="extra-well-name">
            ${well.name}
            ${canCollect ? '<span style="color:#10b981; font-size:10px;"><i class="fas fa-circle"></i> جاهز</span>' : ''}
          </div>
          <div class="extra-well-desc">${well.description || ''}</div>
          <div class="extra-well-stats">
            <div class="extra-well-stat">
              <i class="fas fa-oil-can"></i>
              <span>${formatNumber(well.dailyOil)}/يوم</span>
            </div>
            <div class="extra-well-stat">
              <i class="fas fa-coins"></i>
              <span>${formatNumber(well.goldPrice)} ذهب</span>
            </div>
          </div>
          <div class="well-expiry">
            <i class="fas fa-hourglass-half"></i>
            متبقي: ${remainingDays} يوم | إجمالي: ${formatNumber(totalOil)} نفط
          </div>
          ${canCollect ? `
            <button class="collect-extra-btn" onclick="collectExtraWell('${well.id}')">
              <i class="fas fa-hand-holding"></i> تجميع ${formatNumber(collectAmount)} نفط
            </button>
          ` : `
            <div style="margin-top:8px; font-size:10px; color:#64748b;">
              <i class="fas fa-clock"></i> متاح بعد ${24 - Math.floor((now - lastCollection) / (60 * 60 * 1000))} ساعة
            </div>
          `}
        </div>
      </div>
    `;
  }

  function renderAvailableWellCard(well) {
    const { totalOil } = calculateTotalProfit(well);
    const canAfford = resources.gold >= well.goldPrice;
    const isWellOwner = currentUser && well.ownerId === currentUser.uid;
    
    return `
      <div class="available-well-card">
        ${isWellOwner ? `
          <div class="owner-actions">
            <button class="owner-btn edit-btn" onclick="editWell('${well.id}')" title="تعديل">
              <i class="fas fa-pen"></i>
            </button>
          </div>
        ` : ''}
        
        <div class="well-header">
          <div class="well-image" style="background-image: url('${well.image}');">
            ${!well.image ? '<i class="fas fa-oil-well"></i>' : ''}
          </div>
          <div class="well-title">
            <h3>
              ${well.name}
              ${isWellOwner ? '<span class="publisher-badge"><i class="fas fa-user"></i> منشوري</span>' : ''}
            </h3>
            <p>${well.description || 'بئر نفط جديد'}</p>
          </div>
        </div>
        <div class="well-details">
          <div class="detail-item">
            <div class="detail-value">${formatNumber(well.dailyOil)}</div>
            <div class="detail-label">نفط/يوم</div>
          </div>
          <div class="detail-item">
            <div class="detail-value">${well.durationMonths} شهر</div>
            <div class="detail-label">المدة</div>
          </div>
          <div class="detail-item">
            <div class="detail-value">${formatNumber(totalOil)}</div>
            <div class="detail-label">إجمالي النفط</div>
          </div>
          <div class="detail-item">
            <div class="detail-value">${formatNumber(well.goldPrice)}</div>
            <div class="detail-label">ذهب</div>
          </div>
        </div>
        <div class="well-price-section">
          <div class="price-tag">
            <i class="fas fa-coins" style="color:#fbbf24;"></i>
            <span class="price-value">${formatNumber(well.goldPrice)}</span>
            <span class="price-label">ذهب</span>
          </div>
          <button class="buy-well-btn" onclick="buyExtraWell('${well.id}')" ${!canAfford ? 'disabled' : ''}>
            <i class="fas fa-shopping-cart"></i>
            ${canAfford ? 'تطوير البئر' : 'ذهب غير كافٍ'}
          </button>
        </div>
      </div>
    `;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
    } else {
      const container = document.getElementById('oilContainer');
      if (container) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-sign-in-alt"></i>
            <p>يرجى تسجيل الدخول للوصول إلى بئر النفط</p>
          </div>
        `;
      }
    }
  });

  window.addEventListener('beforeunload', () => {
    if (timerInterval) clearInterval(timerInterval);
  });
</script>
</body>
</html>
